name: Generate PDF Resumes
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install and Generate PDFs
        run: |
          npm install -g md-to-pdf
          md-to-pdf resume_en.md
          md-to-pdf resume_tr.md
          md-to-pdf resume_fr.md

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Resumes-Muhammed-Furkan-Demirci
          path: '*.pdf'
